<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevQuest | Algo Visualizer</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="page-container">
    <h1>📊 Algo Visualizer</h1>
    <p class="page-subtitle">Visualize Bubble Sort using animated bars.</p>

    <div class="visualizer-box">
      <div class="bars" id="bars">
        <div class="bar" style="height: 120px;">12</div>
        <div class="bar" style="height: 60px;">6</div>
        <div class="bar" style="height: 180px;">18</div>
        <div class="bar" style="height: 90px;">9</div>
        <div class="bar" style="height: 150px;">15</div>
      </div>
      <button class="btn-primary" onclick="bubbleSortVisual()">Start Bubble Sort</button>
    </div>

    <a href="dashboard.html" class="btn-secondary">← Back to Dashboard</a>
  </div>
  <script src="script.js"></script>
</body>
</html>
